<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에스파 타이틀곡 전체 순위 정렬</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            text-align: center;
            background-color: #f8f9fa;
            margin-top: 50px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .btn {
            width: 250px;
            height: 120px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ffffff;
            border: 2px solid #333;
            border-radius: 10px;
            transition: 0.2s;
            word-break: keep-all;
        }
        .btn:hover {
            background-color: #e9ecef;
        }
        #progress {
            color: #6c757d;
            font-size: 16px;
            margin-top: 10px;
        }
        #resultBoard {
            display: none;
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #0056b3;
            color: white;
            font-size: 18px;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .rank-1 {
            font-weight: bold;
            color: #0056b3;
            font-size: 20px;
            background-color: #e6f0fa !important;
        }
    </style>
</head>
<body>

    <h1>에스파 타이틀곡 전체 순위 정렬</h1>
    <p>더 마음에 드는 곡을 선택하세요. 대진운 없이 완벽한 순위를 만듭니다.</p>
    <div id="progress">준비 중...</div>

    <div class="container" id="gameBoard">
        <button class="btn" id="btnLeft" onclick="makeChoice('insert')"></button>
        <button class="btn" id="btnRight" onclick="makeChoice('sorted')"></button>
    </div>

    <div id="resultBoard">
        <h2 style="color: #333;">🎉 최종 순위 표 🎉</h2>
        <div id="rankingList"></div>
    </div>

    <script>
        // 에스파 역대 타이틀곡 리스트 적용 완료
        let songList = [
            "Black Mamba", "Next Level", "Savage", "Girls", 
            "Spicy", "Drama", "Supernova", "Armageddon", 
            "Whiplash", "Dirty Work", "Rich Man", "LEMONADE"
        ];
        
        // 편향 방지를 위해 처음에 한 번 무작위로 섞기
        songList.sort(() => Math.random() - 0.5);

        let sortedArray = [songList[0]];
        let insertIndex = 1;
        let compareIndex = 0;

        const progressText = document.getElementById("progress");
        const btnLeft = document.getElementById("btnLeft");
        const btnRight = document.getElementById("btnRight");
        const gameBoard = document.getElementById("gameBoard");
        const resultBoard = document.getElementById("resultBoard");
        const rankingList = document.getElementById("rankingList");

        function updateUI() {
            if (insertIndex >= songList.length) {
                showResults();
                return;
            }

            progressText.innerText = "진행률: " + insertIndex + " / " + songList.length + " 곡 배치 중";
            btnLeft.innerText = songList[insertIndex];
            btnRight.innerText = sortedArray[compareIndex];
        }

        function makeChoice(winner) {
            let currentSong = songList[insertIndex];

            if (winner === 'insert') {
                compareIndex--;
                if (compareIndex < 0) {
                    sortedArray.unshift(currentSong);
                    moveToNextSong();
                } else {
                    updateUI();
                }
            } else {
                sortedArray.splice(compareIndex + 1, 0, currentSong);
                moveToNextSong();
            }
        }

        function moveToNextSong() {
            insertIndex++;
            if (insertIndex < songList.length) {
                compareIndex = sortedArray.length - 1;
            }
            updateUI();
        }

        function showResults() {
            gameBoard.style.display = "none";
            progressText.style.display = "none";
            resultBoard.style.display = "block";

            let html = "<table>";
            html += "<tr><th>순위</th><th>곡 제목</th></tr>"; 
            
            for (let i = 0; i < sortedArray.length; i++) {
                let rowClass = (i === 0) ? " class='rank-1'" : "";
                
                html += `<tr${rowClass}>
                            <td>${i + 1}위</td>
                            <td>${sortedArray[i]}</td>
                         </tr>`;
            }
            html += "</table>";
            
            rankingList.innerHTML = html;
        }

        compareIndex = sortedArray.length - 1;
        updateUI();
    </script>

</body>
</html>
